<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Counters Overlay</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:transparent;overflow:hidden}
#cWrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:flex-start;padding:20px;gap:10px;pointer-events:none}

.cnt-box{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.25;text-align:center}
.cnt-box.shape-rounded{border-radius:14px}
.cnt-box.shape-pill{border-radius:999px}
.cnt-box.shape-square{border-radius:3px}
.cnt-box.shape-circle{border-radius:50%;aspect-ratio:1/1;min-width:90px;min-height:90px}
.cnt-box.shape-none{background:transparent!important;border:none!important;box-shadow:none!important}

.cnt-num{display:inline-block}

@keyframes cPop{0%{transform:scale(1)}40%{transform:scale(1.35)}100%{transform:scale(1)}}
@keyframes cBounce{0%{transform:translateY(0)}30%{transform:translateY(-14px)}55%{transform:translateY(2px)}100%{transform:translateY(0)}}
@keyframes cShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes cFlash{0%{filter:brightness(1)}30%{filter:brightness(2.4)}100%{filter:brightness(1)}}
.cAnimPop{animation:cPop .4s ease}
.cAnimBounce{animation:cBounce .5s cubic-bezier(.22,1,.36,1)}
.cAnimShake{animation:cShake .45s ease}
.cAnimFlash{animation:cFlash .5s ease}
</style>
</head>
<body>
<div id="cWrap"><div id="cList" style="display:flex;flex-direction:inherit;align-items:inherit;gap:inherit"></div></div>

<script type="module">
import { setTool, on, startPolling } from '/js/overlay-common.js';

const qs = new URLSearchParams(location.search);
const DEMO = qs.get('demo') === '1';

const wrap = document.getElementById('cWrap');
const list = document.getElementById('cList');
const boxEls = {};
const prevVals = {};
const loadedFonts = new Set();

function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function loadFont(font){
  if(!font || font==='Segoe UI' || loadedFonts.has(font)) return;
  loadedFonts.add(font);
  const l = document.createElement('link');
  l.rel = 'stylesheet';
  l.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(font)}:wght@400;600;700;800&display=swap`;
  document.head.appendChild(l);
}

function hexToRgba(hex, a){
  hex = (hex||'#1e1838').replace('#','');
  if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  const r = parseInt(hex.substr(0,2),16)||0, g = parseInt(hex.substr(2,2),16)||0, b = parseInt(hex.substr(4,2),16)||0;
  return `rgba(${r},${g},${b},${a==null?1:a})`;
}

function renderTemplate(c){
  const s = c.style||{};
  let t = s.template || '{name}: {value}';
  t = t.replace(/\{name\}/g, esc(c.name));
  t = t.replace(/\{value\}/g, `<span class="cnt-num">${esc(c.value)}</span>`);
  return t;
}

function styleBox(el, c){
  const s = c.style||{};
  loadFont(s.font);
  el.className = `cnt-box shape-${s.shape||'rounded'}`;
  el.style.background = hexToRgba(s.bgColor||'#1e1838', s.bgOpacity==null?.85:s.bgOpacity);
  el.style.border = s.borderWidth ? `${s.borderWidth}px solid ${s.borderColor||'#3a315e'}` : 'none';
  el.style.boxShadow = s.glow ? `0 0 ${s.glowSize||14}px ${s.glowColor||s.borderColor||'#fff'}` : 'none';
  el.style.fontFamily = `'${s.font||'Segoe UI'}',sans-serif`;
  el.style.color = s.textColor || '#ffffff';
  el.style.fontWeight = s.fontWeight || 600;
  el.style.fontSize = (s.fontSize||14)+'px';
  el.style.padding = (s.padding==null?14:s.padding)+'px';
  el.style.width  = s.width  ? s.width+'px'  : '';
  el.style.height = s.height ? s.height+'px' : '';
}

function applyChangeAnim(el, id, val, animType){
  if(prevVals[id] === undefined){ prevVals[id] = val; return; }
  if(prevVals[id] === val){ return; }
  prevVals[id] = val;
  if(!animType || animType==='none') return;
  const map = { pop:'cAnimPop', bounce:'cAnimBounce', shake:'cAnimShake', flash:'cAnimFlash' };
  const cls = map[animType]; if(!cls) return;
  el.classList.remove(cls);
  void el.offsetWidth; // restart animation
  el.classList.add(cls);
}

function updateCounterBox(c){
  let el = boxEls[c.id];
  if(!el){ el = document.createElement('div'); list.appendChild(el); boxEls[c.id] = el; }
  styleBox(el, c);
  el.innerHTML = renderTemplate(c).replace(/\n/g, '<br>');
  const numEl = el.querySelector('.cnt-num');
  if(numEl){
    const s = c.style||{};
    numEl.style.color = s.valueColor || s.textColor || '#ffffff';
    numEl.style.fontSize = (s.valueFontSize||28)+'px';
    numEl.style.fontWeight = s.valueWeight||800;
    applyChangeAnim(numEl, c.id, c.value, s.animOnChange);
  }
}

const DEMO_STYLE = { shape:'rounded', bgColor:'#1e1838', bgOpacity:.85, borderColor:'#ffc83d', borderWidth:1,
  glow:false, font:'Segoe UI', textColor:'#ffffff', fontWeight:700, fontSize:14,
  valueColor:'#ffc83d', valueFontSize:30, valueWeight:800, template:'{name}\n{value}', animOnChange:'pop', padding:14 };
let demoValue = 7;

function render(state){
  const layout = (state && state.layout) || {};
  wrap.style.flexDirection = layout.direction==='row' ? 'row' : 'column';
  wrap.style.alignItems    = layout.align || 'flex-start';
  wrap.style.gap           = (layout.gap==null?10:layout.gap)+'px';

  const counters = ((state && state.counters) || []).filter(c => c.visible !== false);

  if(DEMO && counters.length === 0){
    updateCounterBox({ id:'_demo', name:'Deaths', value: demoValue, style: DEMO_STYLE });
    return;
  }

  const seen = new Set();
  counters.forEach(c => { seen.add(String(c.id)); updateCounterBox(c); });
  Object.keys(boxEls).forEach(id => {
    if(!seen.has(id)){ boxEls[id].remove(); delete boxEls[id]; delete prevVals[id]; }
  });
}

on('_snapshot', snap => render(snap));
on('counters_state', ev => render(ev.counters));

// Demo-only local ticker so the preview animates even with no real chat
// commands coming in — only runs while the synthetic fallback counter above
// is showing (i.e. the user hasn't added a real counter yet).
if(DEMO){
  setInterval(()=>{
    if(!boxEls['_demo']) return; // a real counter now exists, stop faking
    demoValue = Math.max(0, demoValue + (Math.random()>.5?1:-1));
    updateCounterBox({ id:'_demo', name:'Deaths', value: demoValue, style: DEMO_STYLE });
  }, 2600);
}

setTool('counters');
startPolling();
</script>
</body>
</html>
