<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheel Overlay</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;background:transparent;overflow:hidden}
#app{position:fixed;inset:0;opacity:0;transition:opacity .5s ease;display:flex;align-items:center;justify-content:center;flex-direction:column}
#app.visible{opacity:1}
.wrap{position:relative}
#pointer{position:absolute;left:50%;transform:translateX(-50%);width:0;height:0;border-left:18px solid transparent;border-right:18px solid transparent;border-top:30px solid #ffc83d;filter:drop-shadow(0 3px 4px rgba(0,0,0,.6));z-index:2}
canvas{display:block;filter:drop-shadow(0 14px 40px rgba(0,0,0,.6))}
#winner{position:fixed;left:0;right:0;top:6%;text-align:center;font-family:Georgia,serif;font-weight:800;font-size:clamp(2.4rem,7vw,5rem);color:#ffc83d;text-shadow:0 0 26px rgba(255,200,61,.55),0 4px 10px rgba(0,0,0,.6);opacity:0;transition:opacity .4s ease;pointer-events:none;padding:0 20px}
#winner.show{opacity:1}
#winner small{display:block;font-size:.32em;color:#fff;font-weight:400;margin-top:6px}
</style>
</head>
<body>
<div id="app">
  <div id="winner"></div>
  <div class="wrap"><div id="pointer"></div><canvas id="wheel" width="600" height="600"></canvas></div>
</div>
<script type="module">
import { drawWheel, winningIndex } from '/js/wheel.js';
import { setTool, on, startPolling } from '/js/overlay-common.js';

const canvas=document.getElementById('wheel'),ctx=canvas.getContext('2d');
const appEl=document.getElementById('app'),winnerEl=document.getElementById('winner');
const pointer=document.getElementById('pointer');
let items=[],cols=['#ff5d73','#ffc83d','#3ddc97','#4cc3ff','#b285ff','#ff9f43'],angle=0,spinning=false;
let fadeTimer=null;

function sizeCanvas(){
  const s=Math.min(window.innerWidth,window.innerHeight)-40;
  canvas.width=Math.max(300,s);canvas.height=canvas.width;
  pointer.style.top=(Math.max(56,canvas.width*0.16)-30)+'px';
  draw();
}
function draw(){ drawWheel(ctx,canvas.width,items,cols,angle); }
window.addEventListener('resize',sizeCanvas);

setTool('wheel');
on('_snapshot',snap=>{
  if(snap?.items) items=snap.items;
  if(snap?.colors) cols=snap.colors;
  draw();
});
on('wheel',ev=>{ if(ev.wheel?.items){items=ev.wheel.items;} if(ev.wheel?.colors){cols=ev.wheel.colors;} draw(); });
on('spin',ev=>{
  if(spinning||!items.length) return;
  spinning=true;
  winnerEl.classList.remove('show');
  if(fadeTimer){clearTimeout(fadeTimer);fadeTimer=null;}
  appEl.classList.add('visible');
  const finalAngle=ev.final_angle;
  const turns=6;let target=finalAngle;
  while(target<angle+turns*2*Math.PI) target+=2*Math.PI;
  const startA=angle,delta=target-startA,dur=4200,t0=performance.now();
  function frame(now){
    const t=Math.min((now-t0)/dur,1),eased=1-Math.pow(1-t,4);
    angle=startA+delta*eased;draw();
    if(t<1) requestAnimationFrame(frame);
    else{
      spinning=false;
      winnerEl.textContent='🎉 '+(ev.winner||'')+' 🎉';
      winnerEl.classList.add('show');
      const hold=(ev.winner_seconds||5)*1000;
      fadeTimer=setTimeout(()=>{
        winnerEl.classList.remove('show');
        appEl.classList.remove('visible');
        fadeTimer=null;
      },hold);
    }
  }
  requestAnimationFrame(frame);
});

sizeCanvas();
startPolling();
</script>
</body>
</html>
